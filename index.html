<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bài Nộp</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      height:100vh;
      display:flex;
      flex-direction:column;
    }

    /* HEADER */
    .header{
      background:#1e293b;
      padding:20px;
      text-align:center;
      border-bottom:2px solid #334155;
    }

    .header h1{
      font-size:28px;
      margin-bottom:10px;
      color:#38bdf8;
    }

    .info{
      font-size:18px;
      line-height:1.6;
    }

    /* MAIN */
    .main{
      flex:1;
      display:flex;
    }

    /* MENU LEFT */
    .sidebar{
      width:250px;
      background:#111827;
      padding:20px;
      border-right:2px solid #334155;
    }

    .sidebar h2{
      margin-bottom:20px;
      color:#38bdf8;
      text-align:center;
    }

    .menu-btn{
      width:100%;
      padding:15px;
      margin-bottom:15px;
      border:none;
      border-radius:12px;
      background:#2563eb;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    .menu-btn:hover{
      background:#1d4ed8;
      transform:scale(1.03);
    }

    /* CONTENT RIGHT */
    .content{
      flex:1;
      background:white;
      padding:10px;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
      border-radius:10px;
    }

  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <h1>TRANG BÀI NỘP</h1>

    <div class="info">
      <p><b>Tên:</b> Hàn Gia Bảo</p>
      <p><b>Lớp:</b> DA25TTC</p>
      <p><b>MSSV:</b> 110125011</p>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- LEFT MENU -->
    <div class="sidebar">
      <h2>Danh Sách Bài</h2>

      <button class="menu-btn"
        onclick="loadPage('bai1.html')">
        Bài 1
      </button>

      <button class="menu-btn"
        onclick="loadPage('bai2.html')">
        Bài 2
      </button>

      <button class="menu-btn"
        onclick="loadPage('https://example.com')">
        Bài 3
      </button>

      <button class="menu-btn"
        onclick="loadPage('thehinh.html')">
        WEB giới thiệu sở thích
      </button>

    </div>

    <!-- RIGHT CONTENT -->
    <div class="content">
      <iframe id="viewer" src=""></iframe>
    </div>

  </div>

  <script>
    function loadPage(page){
      document.getElementById("viewer").src = page;
    }
  </script>

</body>
</html>
